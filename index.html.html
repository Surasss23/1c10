:root {
  --bg: #080808;
  --white: #f5f5f5;
  --mid: #1a1a1a;
  --border: #2e2e2e;
  --muted: #555;
}

body {
  background: var(--bg);
  color: var(--white);
  font-family: 'IBM Plex Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  overflow: hidden;
  position: relative;
}

/* grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.wrapper {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 48px;
  padding: 48px 24px;
  width: 100%;
  max-width: 560px;
}

.header {
  text-align: center;
}

.header h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3rem, 10vw, 5.5rem);
  letter-spacing: 0.08em;
  line-height: 1;
  color: var(--white);
}

.header p {
  margin-top: 8px;
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

.divider {
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
}

.buttons {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

.copy-btn {
  position: relative;
  background: transparent;
  color: var(--white);
  border: 1px solid var(--border);
  border-radius: 0;
  padding: 18px 48px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  overflow: hidden;
  transition: color 0.25s;
}

.copy-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--white);
  transform: translateY(100%);
  transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 0;
}

.copy-btn:hover::before { transform: translateY(0); }
.copy-btn:hover { color: #080808; }

.copy-btn span {
  position: relative;
  z-index: 1;
}

.copy-btn.copied {
  border-color: #fff;
  color: #080808;
}
.copy-btn.copied::before { transform: translateY(0); }

.status {
  font-size: 0.65rem;
  letter-spacing: 0.25em;
  color: var(--muted);
  text-transform: uppercase;
  min-height: 16px;
  text-align: center;
  transition: color 0.3s;
}

.status.active { color: var(--white); }

.corner {
  position: fixed;
  font-size: 0.55rem;
  letter-spacing: 0.15em;
  color: var(--muted);
  text-transform: uppercase;
}
.corner.tl { top: 20px; left: 24px; }
.corner.br { bottom: 20px; right: 24px; }

    // ============================================================

    const statusEl = document.getElementById('status');

    function copyCode(num, btn) {
      const text = num === 1 ? code1 : code2;
      const label = num === 1 ? 'Create_Table' : 'Delete_Table';
      navigator.clipboard.writeText(text).then(() => {
        btn.querySelector('span').textContent = '✓ Copied';
        btn.classList.add('copied');
        statusEl.textContent = label + '.java copied to clipboard';
        statusEl.classList.add('active');
        setTimeout(() => {
          btn.querySelector('span').textContent = `Copy ${num}`;
          btn.classList.remove('copied');
          statusEl.textContent = '\u00a0';
          statusEl.classList.remove('active');
        }, 2500);
      });
    }

  </script>
