body {
  background: #0d0d0d;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  font-family: monospace;
}

.copy-btn {
  background: #f0e040;
  color: #0d0d0d;
  border: none;
  border-radius: 8px;
  padding: 14px 32px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: background 0.15s, transform 0.1s;
}

.copy-btn:hover { background: #ffffff; }
.copy-btn:active { transform: scale(0.96); }
.copy-btn.copied { background: #4ade80; }

    function copyCode(num, btn) {
      const text = num === 1 ? code1 : code2;
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '✓ Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = `Copy ${num}`;
          btn.classList.remove('copied');
        }, 2000);
      });
    }

  </script>
