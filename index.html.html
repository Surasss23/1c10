<body>
    <div class="matrix-bg" id="matrix"></div>
    
    <div class="container">
        <div class="header">
            <h1>► PROBABILITY ENGINE v2.0 ◄</h1>
            <p>Integrating: Sklansky | Thorp | Duke | Shannon | de Moivre</p>
        </div>

        <div class="panel">
            <div class="panel-title">► Historical Data Input</div>
            <div class="input-group">
                <label>Last 10 Outcomes (B=Big, S=Small):</label>
                <input type="text" id="history" maxlength="10" placeholder="e.g., BSBBSBSSBB" onkeyup="validateInput(this)">
            </div>
            
            <div class="input-group">
                <label>11th Outcome (Actual Result):</label>
                <input type="text" id="outcome11" maxlength="1" placeholder="B or S" onkeyup="validateInput(this)">
            </div>
            
            <div class="input-group">
                <label>Your Prediction for 12th:</label>
                <input type="text" id="userPred" maxlength="1" placeholder="What are you thinking? (B/S)" onkeyup="validateInput(this)">
            </div>

            <div class="button-grid">
                <button class="primary" onclick="analyzeLast()">► Process Last Outcome</button>
                <button onclick="predictNext()">► Calculate Next Prediction</button>
            </div>
        </div>

        <div id="analysisPanel" class="panel analysis">
            <div class="panel-title">► Statistical Analysis</div>
            <div id="analysisContent"></div>
        </div>

        <div id="predictionPanel" class="panel analysis">
            <div class="panel-title">► Predictive Engine Output</div>
            <div id="predictionContent"></div>
        </div>
    </div>

    <script>
        // Matrix background effect
        const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
        const matrix = document.getElementById('matrix');
        
        function createMatrix() {
            let output = '';
            for(let i = 0; i < 1000; i++) {
                output += chars[Math.floor(Math.random() * chars.length)] + ' ';
                if(i % 50 === 0) output += '\n';
            }
            matrix.textContent = output;
        }
        setInterval(createMatrix, 100);
        createMatrix();

        function validateInput(input) {
            input.value = input.value.toUpperCase().replace(/[^BS]/g, '');
        }

        // Core probability engine
        class ProbabilityEngine {
            constructor(history, outcome11, userPred) {
                this.history = history;
                this.outcome11 = outcome11;
                this.userPred = userPred;
                this.fullSequence = history + outcome11;
                this.counts = this.calculateCounts();
                this.transitions = this.calculateTransitions();
                this.streaks = this.analyzeStreaks();
                this.entropy = this.calculateEntropy();
            }

            calculateCounts() {
                const b = (this.fullSequence.match(/B/g) || []).length;
                const s = (this.fullSequence.match(/S/g) || []).length;
                return { B: b, S: s, total: this.fullSequence.length };
            }

            calculateTransitions() {
                const trans = { BB: 0, BS: 0, SB: 0, SS: 0 };
                for(let i = 0; i < this.fullSequence.length - 1; i++) {
                    const pair = this.fullSequence[i] + this.fullSequence[i+1];
                    if(trans[pair] !== undefined) trans[pair]++;
                }
                return trans;
            }

            analyzeStreaks() {
                let currentStreak = 1;
                let maxStreakB = 0, maxStreakS = 0;
                let currentType = this.fullSequence[0];
                
                for(let i = 1; i < this.fullSequence.length; i++) {
                    if(this.fullSequence[i] === this.fullSequence[i-1]) {
                        currentStreak++;
                    } else {
                        if(currentType === 'B') maxStreakB = Math.max(maxStreakB, currentStreak);
                        else maxStreakS = Math.max(maxStreakS, currentStreak);
                        currentStreak = 1;
                        currentType = this.fullSequence[i];
                    }
                }
                
                // Check current streak
                let currentRun = 1;
                for(let i = this.fullSequence.length - 2; i >= 0; i--) {
                    if(this.fullSequence[i] === this.fullSequence[this.fullSequence.length - 1]) currentRun++;
                    else break;
                }
                
                return { maxB: maxStreakB, maxS: maxStreakS, currentRun, currentType: this.fullSequence[this.fullSequence.length - 1] };
            }

            calculateEntropy() {
                const p = this.counts.B / this.counts.total;
                const q = 1 - p;
                if(p === 0 || q === 0) return 0;
                return -(p * Math.log2(p) + q * Math.log2(q));
            }

            // Kelly Criterion calculation
            calculateKellyEdge(prob) {
                const b = 1; // even money odds
                const q = 1 - prob;
                const edge = (prob * b - q) / b;
                return edge;
            }

            // Bayesian updating with beta distribution
            bayesianPrediction() {
                const alpha = this.counts.B + 1;
                const beta = this.counts.S + 1;
                const expectedB = alpha / (alpha + beta);
                return expectedB;
            }

            // Markov chain transition probability
            markovPrediction() {
                const last = this.fullSequence[this.fullSequence.length - 1];
                const totalTrans = this.transitions[last + 'B'] + this.transitions[last + 'S'];
                if(totalTrans === 0) return 0.5;
                return this.transitions[last + 'B'] / totalTrans;
            }

            // Gambler's Fallacy vs Hot Hand detection
            detectBias() {
                const runs = this.streaks.currentRun;
                const expectedRuns = Math.log2(this.counts.total);
                
                if(runs > expectedRuns) {
                    return {
                        type: 'HOT_HAND',
                        strength: runs / expectedRuns,
                        message: `Streak of ${runs} detected. Hot hand fallacy risk: ${(runs/expectedRuns).toFixed(2)}x normal`
                    };
                } else if (runs === 1) {
                    return {
                        type: 'MEAN_REVERSION',
                        strength: 1,
                        message: 'Single outcome - no streak pattern'
                    };
                }
                return { type: 'NEUTRAL', strength: 1, message: 'Neutral pattern' };
            }

            // Chi-square test for randomness
            chiSquareTest() {
                const expected = this.counts.total / 2;
                const chiSq = Math.pow(this.counts.B - expected, 2) / expected + 
                             Math.pow(this.counts.S - expected, 2) / expected;
                return chiSq;
            }

            // Final weighted prediction
            getPrediction() {
                const bayes = this.bayesianPrediction();
                const markov = this.markovPrediction();
                const bias = this.detectBias();
                
                // Weight factors based on sample size
                const n = this.counts.total;
                const bayesWeight = Math.min(0.4, n / 100);
                const markovWeight = 0.3;
                const entropyWeight = 0.3 * (1 - this.entropy); // Lower entropy = more predictable
                
                // Adjust for bias
                let biasAdjustment = 0;
                if(bias.type === 'HOT_HAND') {
                    // FADE the streak (regression to mean)
                    biasAdjustment = -0.1 * bias.strength;
                }
                
                const probB = bayes * bayesWeight + markov * markovWeight + 0.5 * entropyWeight + biasAdjustment;
                const probS = 1 - probB;
                
                const recommendation = probB > probS ? 'B' : 'S';
                const confidence = Math.abs(probB - 0.5) * 2;
                const kelly = this.calculateKellyEdge(Math.max(probB, probS));
                
                return {
                    recommendation,
                    probB: probB * 100,
                    probS: probS * 100,
                    confidence: confidence * 100,
                    kellyEdge: kelly,
                    bias,
                    chiSquare: this.chiSquareTest()
                };
            }

            analyzeUserPrediction(userPred) {
                const optimal = this.getPrediction();
                const cognitiveBias = [];
                
                // Check if user is chasing
                if(userPred === this.fullSequence[this.fullSequence.length - 1]) {
                    cognitiveBias.push('RECENCY BIAS: You may be over-weighting recent outcomes');
                }
                
                // Check if user is due-theorying
                const counts = this.counts;
                const majority = counts.B > counts.S ? 'B' : 'S';
                if(userPred !== majority && counts.B !== counts.S) {
                    cognitiveBias.push('GAMBLER\'S FALLACY: Betting against the majority');
                }
                
                // Check if user follows streaks
                if(userPred === this.streaks.currentType && this.streaks.currentRun > 2) {
                    cognitiveBias.push('HOT HAND FALLACY: Following streaks beyond statistical significance');
                }
                
                const isOptimal = userPred === optimal.recommendation;
                
                return {
                    isOptimal,
                    cognitiveBias,
                    optimal,
                    userPred
                };
            }
        }

        function analyzeLast() {
            const history = document.getElementById('history').value;
            const outcome11 = document.getElementById('outcome11').value;
            
            if(history.length !== 10 || !outcome11) {
                alert('► ERROR: Input exactly 10 historical outcomes and the 11th result');
                return;
            }
            
            const engine = new ProbabilityEngine(history, outcome11, '');
            const panel = document.getElementById('analysisPanel');
            const content = document.getElementById('analysisContent');
            
            const counts = engine.counts;
            const chiSq = engine.chiSquareTest();
            const entropy = engine.entropy;
            
            let analysisHTML = `
                <div class="theory-box">
                    <div class="theory-title">► Thorp's Deck Composition Analysis</div>
                    Current distribution: ${counts.B} Big, ${counts.S} Small (${(counts.B/counts.total*100).toFixed(1)}% / ${(counts.S/counts.total*100).toFixed(1)}%)
                    <br>Chi-Square deviation: ${chiSq.toFixed(3)} ${chiSq > 3.84 ? '<span class="big">[SIGNIFICANT BIAS DETECTED]</span>' : '[Within normal variance]'}
                </div>
                
                <div class="theory-box">
                    <div class="theory-title">► Shannon Information Entropy</div>
                    Entropy: ${entropy.toFixed(3)} bits (Max: 1.0)
                    <br>${entropy > 0.9 ? 'High randomness - low predictive edge' : 'Lower entropy - pattern potential detected'}
                </div>
                
                <div class="theory-box">
                    <div class="theory-title">► de Moivre's Streak Analysis</div>
                    Current run: ${engine.streaks.currentRun} consecutive ${engine.streaks.currentType}s
                    <br>Max streaks - B: ${engine.streaks.maxB}, S: ${engine.streaks.maxS}
                    <br>${engine.detectBias().message}
                </div>
                
                <div class="theory-box">
                    <div class="theory-title">► Transition Matrix (Markov Chain)</div>
                    BB: ${engine.transitions.BB} | BS: ${engine.transitions.BS}<br>
                    SB: ${engine.transitions.SB} | SS: ${engine.transitions.SS}
                </div>
                
                <div class="metric">
                    <span class="metric-label">Expected Value per Bet:</span>
                    <span class="metric-value ${engine.counts.B === engine.counts.S ? 'edge-neutral' : 'edge-positive'}">
                        ${engine.counts.B === engine.counts.S ? '0.00' : ((engine.counts.B - engine.counts.S) / counts.total * 0.5).toFixed(4)}
                    </span>
                </div>
            `;
            
            content.innerHTML = analysisHTML;
            panel.classList.add('active');
        }

        function predictNext() {
            const history = document.getElementById('history').value;
            const outcome11 = document.getElementById('outcome11').value;
            const userPred = document.getElementById('userPred').value;
            
            if(history.length !== 10 || !outcome11 || !userPred) {
                alert('► ERROR: Complete all fields first');
                return;
            }
            
            const engine = new ProbabilityEngine(history, outcome11, userPred);
            const prediction = engine.getPrediction();
            const userAnalysis = engine.analyzeUserPrediction(userPred);
            
            const panel = document.getElementById('predictionPanel');
            const content = document.getElementById('predictionContent');
            
            const kellyPct = Math.max(0, prediction.kellyEdge * 100).toFixed(2);
            const betSize = prediction.confidence > 60 ? 'OPTIMAL' : prediction.confidence > 40 ? 'MODERATE' : 'MINIMAL';
            
            content.innerHTML = `
                <div class="theory-box">
                    <div class="theory-title">► Sklansky's Fundamental Theorem</div>
                    ${prediction.recommendation === 'B' ? 
                        'Big shows positive expectation based on composite analysis' : 
                        'Small shows positive expectation based on composite analysis'}
                    <br>Edge magnitude: ${(prediction.confidence - 50).toFixed(1)}% over random
                </div>
                
                <div class="theory-box">
                    <div class="theory-title">► Kelly Criterion Optimization (Fortune's Formula)</div>
                    Recommended bankroll allocation: ${kellyPct}%
                    <br>Full Kelly: ${(prediction.kellyEdge * 100).toFixed(1)}% | Half Kelly: ${(prediction.kellyEdge * 50).toFixed(1)}%
                </div>
                
                <div class="theory-box">
                    <div class="theory-title">► Duke's Cognitive Bias Audit</div>
                    ${userAnalysis.cognitiveBias.length > 0 ? 
                        userAnalysis.cognitiveBias.join('<br>') : 
                        'No major cognitive biases detected in your prediction'}
                    <br><br>
                    Your prediction: <span class="${userPred === 'B' ? 'big' : 'small'}">${userPred}</span> | 
                    Optimal: <span class="${prediction.recommendation === 'B' ? 'big' : 'small'}">${prediction.recommendation}</span>
                    <br>Alignment: ${userAnalysis.isOptimal ? '<span class="edge-positive">OPTIMAL</span>' : '<span class="edge-negative">SUBOPTIMAL</span>'}
                </div>
                
                <div class="metric">
                    <span class="metric-label">Probability Big:</span>
                    <span class="metric-value big">${prediction.probB.toFixed(1)}%</span>
                </div>
                <div class="probability-bar">
                    <div class="probability-fill" style="width: ${prediction.probB}%"></div>
                    <div class="probability-text">${prediction.probB.toFixed(1)}% / ${prediction.probS.toFixed(1)}%</div>
                </div>
                
                <div class="metric">
                    <span class="metric-label">Probability Small:</span>
                    <span class="metric-value small">${prediction.probS.toFixed(1)}%</span>
                </div>
                
                <div class="metric">
                    <span class="metric-label">Confidence Interval:</span>
                    <span class="metric-value">${prediction.confidence.toFixed(1)}%</span>
                </div>
                
                <div class="metric">
                    <span class="metric-label">Information Advantage:</span>
                    <span class="metric-value ${prediction.confidence > 55 ? 'edge-positive' : 'edge-neutral'}">
                        ${prediction.confidence > 60 ? 'HIGH' : prediction.confidence > 52 ? 'MODERATE' : 'MINIMAL'}
                    </span>
                </div>
                
                <div class="recommendation">
                    <h3 class="blink">► EXECUTE: ${prediction.recommendation === 'B' ? 'BIG' : 'SMALL'} ◄</h3>
                    <p>Kelly Position Size: ${betSize}</p>
                    <p style="margin-top: 10px; font-size: 0.8em;">
                        ${prediction.bias.type === 'HOT_HAND' ? 
                            'WARNING: Fade the public - streak psychology detected' : 
                            'Standard distribution play'}
                    </p>
                </div>
                
                <div class="calculation-log">
                    [LOG] Bayesian prior: ${(engine.bayesianPrediction() * 100).toFixed(2)}%
                    [LOG] Markov transition: ${(engine.markovPrediction() * 100).toFixed(2)}%
                    [LOG] Entropy factor: ${(engine.entropy * 100).toFixed(2)}%
                    [LOG] Bias adjustment: ${prediction.bias.type}
                    [LOG] Composite weighted: ${prediction.probB.toFixed(2)}%
                </div>
            `;
            
            panel.classList.add('active');
        }
    </script>
</body>
