<!doctype html>
<html lang="hi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LED Screen - Exam Message</title>
  <style>
    :root{
      --bg:#050505;
      --frame:#222;
      --led-dot:#0a0a0a;
      --led-lit: #ffd400; /* yellow text */
      --speed: 22s; /* change to make movement faster/slower */
    }
    html,body{
      height:100%;
      margin:0;
      font-family: "Courier New", Courier, monospace;
      background: linear-gradient(#000000,#0a0a0a);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      box-sizing:border-box;
    }

    /* screen frame */
    .led-screen{
      width: min(960px, 95%);
      height: 220px;
      border-radius:12px;
      background: linear-gradient(180deg, #0b0b0b, #151515);
      box-shadow: 0 12px 30px rgba(0,0,0,0.7), inset 0 6px 18px rgba(255,255,255,0.02);
      border: 8px solid var(--frame);
      position: relative;
      overflow: hidden;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      padding: 18px;
    }

    /* subtle LED matrix dots as background */
    .led-screen::before{
      content:"";
      position:absolute;
      inset:0;
      background-image:
        radial-gradient(circle at 10px 10px, rgba(0,0,0,0.0) 2px, rgba(0,0,0,0.0) 3px, transparent 3px),
        radial-gradient(circle, rgba(255,255,255,0.02) 0.5px, rgba(0,0,0,0) 1px);
      background-size:18px 18px, 18px 18px;
      mix-blend-mode: overlay;
      opacity:0.35;
      pointer-events:none;
    }

    /* inner mask to create scanline/LED glow */
    .led-overlay{
      position:absolute;
      inset:0;
      background:
        linear-gradient(transparent 60%, rgba(255,255,255,0.02) 61%, transparent 62%),
        linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255,255,255,0.00));
      background-size: 100% 6px, 100% 100%;
      pointer-events:none;
      mix-blend-mode: overlay;
      opacity:0.15;
    }

    /* message row */
    .ticker-wrap{
      position:relative;
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      overflow:hidden;
      z-index:2;
    }

    .ticker{
      display:inline-block;
      white-space:nowrap;
      will-change: transform;
      font-size: 48px;
      letter-spacing: 2px;
      font-weight:700;
      text-transform: none;
      color: var(--led-lit);
      text-shadow:
        0 0 6px rgba(255,212,0,0.9),
        0 0 18px rgba(255,200,0,0.6),
        0 0 36px rgba(255,180,0,0.25);
      padding-left: 100%; /* start off-screen right */
      animation: scroll var(--speed) linear infinite;
      transform: translateX(0);
    }

    /* repeat the message so there's no gap — two copies */
    .ticker + .ticker{
      margin-left: 50px;
    }

    /* slow blinking effect (like LED) */
    @keyframes blink {
      0% { opacity:1; filter:brightness(1);}
      50% { opacity:0.95; filter:brightness(1.05);}
      100% { opacity:1; filter:brightness(1);}
    }
    .ticker { animation-name: scroll, blink; animation-duration: var(--speed), 1.2s; animation-iteration-count: infinite, infinite; animation-timing-function: linear, ease-in-out; }

    @keyframes scroll {
      0%   { transform: translateX(0%); }     /* using padding-left start */
      100% { transform: translateX(-100%); }  /* move to left */
    }

    /* make text responsive */
    @media (max-width:700px){
      .led-screen{height:140px;}
      .ticker{font-size:28px;}
    }

    /* small control box for editing quickly (not necessary) */
    .control{
      position:absolute;
      right:10px;
      bottom:8px;
      font-size:12px;
      color:#aaa;
      z-index:3;
      background: rgba(0,0,0,0.25);
      padding:6px 8px;
      border-radius:6px;
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>
  <div class="led-screen" role="img" aria-label="Exam message LED screen">
    <div class="ticker-wrap" aria-hidden="false">
      <!-- Two copies so the scroll looks continuous -->
      <div class="ticker">Exam Ka Padh Le Vaishali Bkl &nbsp; • &nbsp;</div>
      <div class="ticker">Exam Ka Padh Le Vaishali Bkl &nbsp; • &nbsp;</div>
    </div>

    <div class="led-overlay" aria-hidden="true"></div>

    <div class="control">
      Text color: yellow • Speed: <strong>slow</strong>
    </div>
  </div>

  <!-- Optional: small script to easily change text or speed -->
  <script>
    // If you want to change text or speed dynamically, you can uncomment and edit:
    // const msg = "Exam Ka Padh Le Vaishali Bkl";

    // document.documentElement.style.setProperty('--speed','12s'); // faster
  </script>
</body>
</html>
