<body>
    <div class="container">
        <div class="header">
            <h1>► EDGE CALCULATOR v3.0 ◄</h1>
            <p>Sklansky | Thorp | Duke | Shannon | de Moivre</p>
        </div>

        <!-- History Panel -->
        <div class="panel">
            <div class="panel-title">► Session History (Last 10)</div>
            <div class="history-display" id="historyDisplay">
                <span style="color: #004d00;">NO DATA - BEGIN RECORDING</span>
            </div>
            
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">Total Recorded</div>
                    <div class="stat-value" id="totalCount">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Big Count</div>
                    <div class="stat-value big" id="bigCount">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Small Count</div>
                    <div class="stat-value small" id="smallCount">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Current Streak</div>
                    <div class="stat-value" id="currentStreak">-</div>
                </div>
            </div>

            <div class="streak-bar">
                <div class="streak-label">Big Bias:</div>
                <div class="streak-visual">
                    <div class="streak-fill big" id="bigBar" style="width: 50%"></div>
                </div>
            </div>
        </div>

        <!-- Input Panel -->
        <div class="panel">
            <div class="panel-title">► Record Outcome</div>
            <div class="button-grid">
                <button class="btn-big" onclick="recordOutcome('B')">RECORD BIG</button>
                <button class="btn-small" onclick="recordOutcome('S')">RECORD SMALL</button>
                <button class="btn-reset" onclick="resetHistory()">RESET SESSION</button>
            </div>
        </div>

        <!-- Prediction Panel -->
        <div class="panel">
            <div class="panel-title">► Prediction Analysis</div>
            
            <div class="input-section">
                <label>Your Prediction (What you're thinking for next):</label>
                <input type="text" class="prediction-input" id="userPrediction" maxlength="1" placeholder="Enter B or S">
            </div>

            <button class="btn-action" onclick="calculateEdge()">CALCULATE EDGE & ANALYZE</button>

            <div class="analysis-output" id="analysisOutput">
                <!-- Dynamic content -->
            </div>
        </div>
    </div>

    <script>
        // Data persistence
        let sessionHistory = JSON.parse(localStorage.getItem('edgeCalcHistory')) || [];

        // Initialize display
        updateDisplay();

        function recordOutcome(outcome) {
            sessionHistory.push(outcome);
            // Keep only last 20 for analysis depth
            if(sessionHistory.length > 20) {
                sessionHistory = sessionHistory.slice(-20);
            }
            saveHistory();
            updateDisplay();
            
            // Clear previous analysis
            document.getElementById('analysisOutput').classList.remove('active');
        }

        function resetHistory() {
            if(confirm('► RESET ALL SESSION DATA?')) {
                sessionHistory = [];
                localStorage.removeItem('edgeCalcHistory');
                updateDisplay();
                document.getElementById('analysisOutput').classList.remove('active');
                document.getElementById('userPrediction').value = '';
            }
        }

        function saveHistory() {
            localStorage.setItem('edgeCalcHistory', JSON.stringify(sessionHistory));
        }

        function updateDisplay() {
            const display = document.getElementById('historyDisplay');
            const recent = sessionHistory.slice(-10);
            
            if(recent.length === 0) {
                display.innerHTML = '<span style="color: #004d00;">NO DATA - BEGIN RECORDING</span>';
            } else {
                display.innerHTML = recent.map((item, idx) => {
                    const isLatest = idx === recent.length - 1;
                    const className = item === 'B' ? 'big' : 'small';
                    const blink = isLatest ? 'style="animation: fadeIn 0.5s;"' : '';
                    return `<span class="history-item ${className}" ${blink}>${item}</span>`;
                }).join(' ');
            }

            // Update stats
            const total = sessionHistory.length;
            const bigCount = sessionHistory.filter(x => x === 'B').length;
            const smallCount = total - bigCount;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('bigCount').textContent = bigCount;
            document.getElementById('smallCount').textContent = smallCount;

            // Calculate streak
            let streak = 0;
            let streakType = '-';
            if(total > 0) {
                const last = sessionHistory[total - 1];
                streakType = last;
                for(let i = total - 1; i >= 0; i--) {
                    if(sessionHistory[i] === last) streak++;
                    else break;
                }
            }
            document.getElementById('currentStreak').innerHTML = 
                streak > 0 ? `<span class="${streakType === 'B' ? 'big' : 'small'}">${streak} ${streakType}</span>` : '-';

            // Update bias bar
            if(total > 0) {
                const bigPct = (bigCount / total) * 100;
                document.getElementById('bigBar').style.width = bigPct + '%';
            } else {
                document.getElementById('bigBar').style.width = '50%';
            }
        }

        function calculateEdge() {
            const userPred = document.getElementById('userPrediction').value.toUpperCase();
            
            if(!userPred || (userPred !== 'B' && userPred !== 'S')) {
                alert('► ENTER VALID PREDICTION (B or S)');
                return;
            }

            if(sessionHistory.length < 5) {
                alert('► NEED MINIMUM 5 OUTCOMES FOR ANALYSIS');
                return;
            }

            const analysis = generateAnalysis(userPred);
            document.getElementById('analysisOutput').innerHTML = analysis;
            document.getElementById('analysisOutput').classList.add('active');
        }

        function generateAnalysis(userPred) {
            const history = sessionHistory;
            const last10 = history.slice(-10);
            const n = history.length;
            
            // Basic counts
            const bigCount = history.filter(x => x === 'B').length;
            const smallCount = n - bigCount;
            const pBig = bigCount / n;
            const pSmall = 1 - pBig;

            // Transition analysis (Markov)
            let transBB = 0, transBS = 0, transSB = 0, transSS = 0;
            for(let i = 0; i < n - 1; i++) {
                const pair = history[i] + history[i+1];
                if(pair === 'BB') transBB++;
                else if(pair === 'BS') transBS++;
                else if(pair === 'SB') transSB++;
                else if(pair === 'SS') transSS++;
            }

            const lastOutcome = history[n-1];
            const transFromLast = lastOutcome === 'B' ? 
                { toB: transBB, toS: transBS, total: transBB + transBS } :
                { toB: transSB, toS: transSS, total: transSB + transSS };
            
            const markovProb = transFromLast.total > 0 ? transFromLast.toB / transFromLast.total : 0.5;

            // Streak analysis
            let currentStreak = 1;
            for(let i = n - 2; i >= 0; i--) {
                if(history[i] === lastOutcome) currentStreak++;
                else break;
            }

            // Expected streak length in random sequence
            const expectedStreak = Math.log2(n) + 0.577; // Euler's constant approximation
            
            // Kelly Criterion calculation
            // Assuming even money odds (1:1)
            const empiricalEdge = Math.abs(pBig - 0.5);
            const kellyFraction = empiricalEdge / 1; // Full Kelly
            
            // Composite probability (weighted ensemble)
            // Bayesian: 40%, Markov: 30%, Streak regression: 30%
            let streakAdjustment = 0;
            if(currentStreak > expectedStreak) {
                // Fade the streak (regression to mean)
                streakAdjustment = -0.15 * (currentStreak / expectedStreak);
            }
            
            const bayesProb = (bigCount + 1) / (n + 2); // Laplace smoothing
            const compositeProb = bayesProb * 0.4 + markovProb * 0.3 + 0.5 * 0.3 + streakAdjustment;
            const clampedProb = Math.max(0.1, Math.min(0.9, compositeProb));
            
            const recommendation = clampedProb > 0.5 ? 'B' : 'S';
            const confidence = Math.abs(clampedProb - 0.5) * 2;
            
            // Cognitive bias detection
            const biases = [];
            if(userPred === lastOutcome) {
                biases.push('RECENCY BIAS: Chasing last outcome');
            }
            if(currentStreak > 2 && userPred === lastOutcome) {
                biases.push('HOT HAND FALLACY: Extending streaks beyond probability');
            }
            if(bigCount > smallCount && userPred === 'S') {
                biases.push('GAMBLER\'S FALLACY: Betting "due" outcomes');
            }
            if(smallCount > bigCount && userPred === 'B') {
                biases.push('GAMBLER\'S FALLACY: Betting "due" outcomes');
            }

            // Generate HTML
            let html = `
                <div class="theory-box">
                    <div class="theory-title">► Thorp's Frequency Analysis</div>
                    Empirical probabilities: Big ${(pBig*100).toFixed(1)}% | Small ${(pSmall*100).toFixed(1)}%
                    <br>Sample size: ${n} | Standard error: ${(Math.sqrt(pBig*pSmall/n)*100).toFixed(2)}%
                </div>

                <div class="theory-box">
                    <div class="theory-title">► Shannon's Markov Chain</div>
                    Last outcome: ${lastOutcome} | Transition to Big: ${(markovProb*100).toFixed(1)}%
                    <br>Transition counts from ${lastOutcome}: ${transFromLast.toB}→B, ${transFromLast.toS}→S
                </div>

                <div class="theory-box">
                    <div class="theory-title">► de Moivre's Streak Analysis</div>
                    Current run: ${currentStreak} consecutive ${lastOutcome}s
                    <br>Expected max streak for ${n} trials: ~${expectedStreak.toFixed(1)}
                    <br>${currentStreak > expectedStreak ? 
                        `<span class="edge-negative">Streak exceeds expectation - mean reversion likely</span>` : 
                        '<span class="edge-neutral">Streak within normal variance</span>'}
                </div>

                <div class="theory-box">
                    <div class="theory-title">► Duke's Cognitive Audit</div>
                    Your prediction: <span class="${userPred === 'B' ? 'big' : 'small'}">${userPred}</span>
                    ${biases.length > 0 ? '<br>Detected biases:<br>• ' + biases.join('<br>• ') : '<br>No major cognitive biases detected'}
                </div>

                <div class="theory-box">
                    <div class="theory-title">► Sklansky's Fundamental Theorem</div>
                    Composite probability (Bayesian 40% + Markov 30% + Base 30% + Streak adj):
                    <br>Big: ${(clampedProb*100).toFixed(1)}% | Small: ${((1-clampedProb)*100).toFixed(1)}%
                </div>

                <div class="theory-box">
                    <div class="theory-title">► Kelly Criterion (Fortune's Formula)</div>
                    Calculated edge: ${(empiricalEdge*100).toFixed(2)}%
                    <br>Recommended position: ${(kellyFraction*100).toFixed(1)}% of bankroll (Full Kelly)
                    <br>Conservative (Half Kelly): ${(kellyFraction*50).toFixed(1)}%
                </div>

                <div class="recommendation">
                    <h2 class="${recommendation === 'B' ? 'big' : 'small'}">
                        ► EXECUTE: ${recommendation === 'B' ? 'BIG' : 'SMALL'} ◄
                    </h2>
                    <p>Confidence: ${(confidence*100).toFixed(0)}% | 
                       Your alignment: ${userPred === recommendation ? 
                           '<span class="edge-positive">OPTIMAL</span>' : 
                           '<span class="edge-negative">SUBOPTIMAL</span>'}</p>
                    <p style="margin-top: 10px; font-size: 0.9em;">
                        ${confidence > 0.6 ? 'STRONG EDGE DETECTED' : 
                          confidence > 0.3 ? 'MODERATE EDGE' : 'WEAK EDGE - MINIMAL POSITION'}
                    </p>
                </div>

                <div class="calculation-log">
                    <div class="log-entry">[${new Date().toLocaleTimeString()}] Analysis initiated</div>
                    <div class="log-entry">[CALC] Bayesian prior (Laplace): ${(bayesProb*100).toFixed(2)}%</div>
                    <div class="log-entry">[CALC] Markov transition P(B|${lastOutcome}): ${(markovProb*100).toFixed(2)}%</div>
                    <div class="log-entry">[CALC] Streak adjustment: ${(streakAdjustment*100).toFixed(2)}%</div>
                    <div class="log-entry">[CALC] Composite P(Big): ${(clampedProb*100).toFixed(2)}%</div>
                    <div class="log-entry">[CALC] Kelly fraction: ${kellyFraction.toFixed(4)}</div>
                    <div class="log-entry">[BIAS] ${biases.length} cognitive traps detected</div>
                    <div class="log-entry">[OUT] Recommendation: ${recommendation}</div>
                </div>
            `;

            return html;
        }

        // Allow Enter key to submit
        document.getElementById('userPrediction').addEventListener('keypress', function(e) {
            if(e.key === 'Enter') calculateEdge();
        });
    </script>
</body>
</html>
