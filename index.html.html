<title>Gallery</title>
<style>
  body {
    margin: 0;
    background: #ffffff;
    font-family: Arial, sans-serif;
    padding: 10px;
  }
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
  }
  .gallery a {
    display: block;
    width: 100%;
  }
  .gallery img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 10px;
  }
</style>
</head>
