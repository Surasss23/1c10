<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Copy Boxes – Suraj Tools</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #eef6ff;
        padding: 20px;
        color: #002b4d;
    }
    h2 {
        text-align: center;
        color: #004f7a;
    }
    .box {
        background: #ffffff;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        margin-bottom: 30px;
    }
    textarea {
        width: 100%;
        height: 300px;
        border-radius: 8px;
        border: 1px solid #bcd7ea;
        padding: 10px;
        font-size: 14px;
        background: #f7fbff;
        color: #003753;
    }
    button {
        margin-top: 10px;
        padding: 10px 18px;
        background: #0077b6;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }
    button:hover {
        background: #005f8a;
    }
</style>

<script>
function copyText(id) {
    var text = document.getElementById(id);
    text.select();
    text.setSelectionRange(0, 99999);
    navigator.clipboard.writeText(text.value);
    alert("Copied!");
}
</script>
</head>
<body>

<h2>Copy Your Code Easily</h2>

<div class="box">
    <h3>📌 Box 1: ASP.NET WebForm Code</h3>

WebForm1.aspx.cs program:
using System;
using System.Web.UI.WebControls;
namespace WebApplication3
{
public partial class WebForm1 : System.Web.UI.Page
{
protected void Page_Load(object sender, EventArgs e)
{
if (!IsPostBack)
{
string[] courses = { "B.Sc", "B.Com", "B.C.A", "B.B.A" };
c1.Items.Add(new ListItem("Select course",""){ Enabled = true });

for (int i = 0; i < courses.Length; i++)
{
string courseCode = courses[i].ToLower().Replace(".","");
c1.Items.Add(new ListItem(courseCode, courses[i]));
}
}
}

protected void btnSubmit_Click(object sender, EventArgs e)
{
string rollNo = t1.Text;
string name = t2.Text;
string course = c1.SelectedValue;
L6.Text = $"Roll No: {rollNo}, Name: {name}, Course: {course}";
}
}
}
    </textarea>
    <button onclick="copyText('code1')">Copy Box 1</button>
</div>
